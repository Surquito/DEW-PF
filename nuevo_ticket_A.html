<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Mesa de Ayuda - Nuevo Ticket</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="nuevo_ticket_A.css">
</head>
<body>
  <header>
    <div class="team"> IT HELP </div>
    <div class="search-bar">
        <input type="text" id="busqueda" placeholder="Buscar tickets, usuario, reporte">
        <button><i class="bi bi-search"></i></button>
    </div>
    <div class="icon-right">
      <a href="#usuario">Analista <i class="bi bi-person-circle"></i></a>
    </div>
  </header>

  <div class="container">
    <nav class="sidebar">
      <ul>
        <li><a href="#home">Inicio</a></li>
        <li>
          <a href="#magticket">GestiónTicket</a><br>
          <ul class="submenu">
            <li><a href="#newticket">Nuevo Ticket</a></li>
            <li><a href="#readticket">Consultar Ticket</a></li>
          </ul>
        </li>
        <li>
          <a href="#settings">Configuración</a><br>
          <ul class="submenu">
            <li><a href="#newuser">Nuevo Usuario</a></li>
            <li><a href="#readuser">Consultar Usuario</a></li>
          </ul>
        </li>
      </ul>
      <div class="sidebar-btn">
        <button class="btn-close-sesion">Cerrar Sesión</button>
      </div>  
    </nav>

    <main id="contenido">
      <div class="ticket-wrapper">
        <h2 class="ticket-title">Nuevo Ticket</h2>
        
        <form class="ticket-form">
          <div class="form-row-2col">
            <div class="form-col">
              <div class="field-group">
                <label>Task ID:</label>
                <input type="text" value="Autogenerado" readonly class="input-bordered input-center">
              </div>
              <div class="field-group">
                <label>Type Task:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
              <div class="field-group">
                <label>Área:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
              <div class="field-group">
                <label>Usuario:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
            </div>
            <div class="form-col pt-empty">
              <div class="field-group">
                <label>Estado:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
              <div class="field-group">
                <label>Categoría:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
              <div class="field-group">
                <label>Sub Categoría:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
            </div>
          </div>

          <div class="form-row-full">
            <div class="field-group-full">
              <label>Asunto:</label>
              <input type="text" class="input-bordered">
            </div>
            <div class="field-group-full align-top">
              <label>Descripción:</label>
              <textarea rows="4" class="input-bordered"></textarea>
            </div>
          </div>

          <div class="form-row-2col mt-spacing">
            <div class="form-col">
              <div class="field-group align-top">
                <label>Nota:</label>
                <textarea rows="3" class="input-bordered"></textarea>
              </div>
              <div class="field-group">
                <label>Soporte:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
              <div class="field-group">
                <label>Analista:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
            </div>
            <div class="form-col">
              <div class="field-group">
                <label>Attachments:</label>
                <div class="attachment-box input-bordered">
                  <input type="text" readonly>
                  <i class="bi bi-paperclip"></i>
                </div>
              </div>
              <div class="field-group">
                <label>Impacto:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
              <div class="field-group">
                <label>Prioridad:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
              <div class="field-group">
                <label>Urgencia:</label>
                <select class="input-select"><option>Seleccione</option></select>
              </div>
            </div>
          </div>

          <div class="form-actions-bottom">
            <button type="button" class="btn-action btn-crear">Crear</button>
            <button type="button" class="btn-action btn-limpiar">Limpiar</button>
          </div>
        </form>
      </div>
    </main>
  </div>
</body>
</html>
