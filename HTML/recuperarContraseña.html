<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar contraseña</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
    />
    <link rel="stylesheet" href="../CSS/styleLogin.css" />
</head>
<body>
    <div class="contenedorRecuperar">

        <div class="contenedorFormulario">
            <div class="formulario">
                <h2>Restablecer</h2>
                <p>Ingresa tus nuevos datos de acceso</p>
                <form>
                    <div class="campoForm">
                        <input type="email" id="correoRecuperacion" placeholder="Correo electrónico" required>
                    </div>
                    <div class="campoForm">
                        <div class="passwordWrapper">
                            <input type="password" id="nuevaContrasena" placeholder="Nueva contraseña" required>
                            <button type="button" class="togglePassword" aria-label="Mostrar u ocultar nueva contraseña" onclick="alternarContrasenaPorId('nuevaContrasena', 'iconNuevaContrasena')">
                                <i class="bi bi-eye" id="iconNuevaContrasena" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>
                    <div class="campoForm">
                        <div class="passwordWrapper">
                            <input type="password" id="repetirContrasena" placeholder="Repetir contraseña" required>
                            <button type="button" class="togglePassword" aria-label="Mostrar u ocultar repetición de contraseña" onclick="alternarContrasenaPorId('repetirContrasena', 'iconRepetirContrasena')">
                                <i class="bi bi-eye" id="iconRepetirContrasena" aria-hidden="true"></i>
                            </button>
                        </div>
                    </div>

                    <p id="mensajeRecuperacion" class="mensajeValidacion" role="alert" aria-live="polite"></p>

                    <button type="button"
                    class="btnLogin"
                    onclick="validarContrasenasRecuperacion()">
                    Guardar y volver
                    </button>
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script src="../JS/recuperarContraseña.js"></script>
</body>
</html>
