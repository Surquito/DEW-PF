<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" />
  <link rel="stylesheet" href="../CSS/styleLogin.css" />
</head>

<body>
  <div class="contenedorLogin">
    <div class="contenedorImagen">
      <div class="imagen">
        <img src="../IMG/bg_login.png" alt="Soporte" />
      </div>
    </div>
    <div class="contenedorFormularioLogin">
      <div class="formulario">
        <h2>Bienvenido</h2>
        <p>Ingrese con su cuenta para continuar</p>
        <form>
          <div class="campoForm">
            <input type="text" id="user" placeholder="Usuario" required>
          </div>
          <div class="campoForm">
            <div class="passwordWrapper">
              <input type="password" id="password" placeholder="Contraseña" required>
              <button type="button" class="togglePassword" id="togglePassword" aria-label="Mostrar u ocultar contraseña"
                onclick="alternarContrasena('password', 'togglePasswordIcon')">
                <i class="bi bi-eye" id="togglePasswordIcon" aria-hidden="true"></i>
              </button>
            </div>
          </div>
          <div class="enlace">
            <a href="recuperarContraseña.html">¿Olvidaste tu contraseña?</a>
          </div>
          <button type="button" class="btnLogin"
            onclick="validarUsuario(document.getElementById('user').value, document.getElementById('password').value)">Ingresar</button>
        </form>
      </div>
    </div>
  </div>
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="../JS/login.js"></script>
</body>

</html>
